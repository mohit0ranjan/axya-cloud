name: React Native Android CI/CD

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "docs/**"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "docs/**"
  workflow_dispatch:
    inputs:
      buildType:
        type: choice
        description: "Build type to run"
        options:
          - release
          - debug
          - all
        default: release

permissions:
  contents: read

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "1"
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  checks:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install npm dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Expo doctor
        run: npx expo-doctor

      - name: Validate Android bundle export
        run: npx expo export --platform android --output-dir ../tmp-export

  build-release:
    runs-on: ubuntu-latest
    if: |
      ((github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]')) &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.buildType == 'release' || github.event.inputs.buildType == 'all'))
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install npm dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Ensure Android project exists
        run: |
          if [ ! -f android/gradlew ]; then
            npx expo prebuild --platform android --non-interactive
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set JAVA_HOME
        run: echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('app/android/**/*.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew --build-cache --parallel --max-workers=2 --no-daemon -Dorg.gradle.jvmargs="-Xmx3072m -XX:MaxMetaspaceSize=512m" -x lint -x test assembleRelease

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-logs-release
          path: android/app/build/reports/**

  build-debug:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.buildType == 'debug' || github.event.inputs.buildType == 'all')
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install npm dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Ensure Android project exists
        run: |
          if [ ! -f android/gradlew ]; then
            npx expo prebuild --platform android --non-interactive
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set JAVA_HOME
        run: echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('app/android/**/*.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew --build-cache --parallel --max-workers=2 --no-daemon -Dorg.gradle.jvmargs="-Xmx3072m -XX:MaxMetaspaceSize=512m" -x lint -x test assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-logs-debug
          path: android/app/build/reports/**
