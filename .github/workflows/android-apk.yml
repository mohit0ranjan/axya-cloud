name: React Native Android CI/CD

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "docs/**"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "docs/**"
  workflow_dispatch:
    inputs:
      buildType:
        type: choice
        description: "Build type to run"
        options:
          - debug
          - release
          - all
        default: release

permissions:
  contents: read

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "1"
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  checks:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install npm dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Expo doctor
        run: npx expo-doctor

      - name: Run expo prebuild (Android)
        run: npx expo prebuild --platform android

      - name: Validate Android bundle export
        run: npx expo export --platform android --output-dir ../tmp-export

  build-release:
    runs-on: ubuntu-latest
    if: |
      ((github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]')) &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.buildType == 'all' || github.event.inputs.buildType == 'release'))
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install npm dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Restore Gradle caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('app/package-lock.json', 'app/package.json') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Release APK
        working-directory: app/android
        run: |
          chmod +x gradlew
          ./gradlew --build-cache --parallel --no-daemon -x lint -x test assembleRelease

      - name: Upload Release artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: app/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn
          compression-level: 0
          retention-days: 7

  build-debug:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.buildType == 'all' || github.event.inputs.buildType == 'debug')
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install npm dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Restore Gradle caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('app/package-lock.json', 'app/package.json') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        working-directory: app/android
        run: |
          chmod +x gradlew
          ./gradlew --build-cache --parallel --no-daemon -x lint -x test assembleDebug

      - name: Upload Debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
          compression-level: 0
          retention-days: 7
