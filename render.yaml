services:
  - type: web
    name: axya-server
    runtime: node
    rootDir: .
    plan: free
    autoDeploy: true
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: COOKIE_SECRET
        sync: false
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: TELEGRAM_SESSION
        sync: false
      - key: TELEGRAM_STORAGE_SESSION
        sync: false
      - key: TELEGRAM_STORAGE_CHAT_ID
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://axya-web.onrender.com
      - key: FRONTEND_BASE_URL
        value: https://axya-web.onrender.com
      - key: SERVER_BASE_URL
        value: https://axya-server.onrender.com
      - key: SHARE_V2_META_CACHE_TTL_SECONDS
        value: 20
      - key: SHARE_V2_LOOKUP_CACHE_TTL_SECONDS
        value: 20
      - key: SHARE_V2_ITEMS_CACHE_TTL_SECONDS
        value: 12

  - type: web
    name: axya-web
    runtime: node
    rootDir: web
    plan: free
    autoDeploy: true
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://axya-server.onrender.com
      - key: NEXT_PUBLIC_SITE_URL
        value: https://axya-web.onrender.com
